name: Release macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Homebrew ffmpeg
        run: |
          brew update
          brew install ffmpeg

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Future notarization secrets (placeholder)
        if: always()
        run: |
          echo "APPLE_CERTIFICATE_BASE64 configured: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}"
          echo "APPLE_CERT_PASSWORD configured: ${{ secrets.APPLE_CERT_PASSWORD != '' }}"
          echo "APPLE_ID configured: ${{ secrets.APPLE_ID != '' }}"
          echo "APPLE_APP_PASSWORD configured: ${{ secrets.APPLE_APP_PASSWORD != '' }}"
          echo "TEAM_ID configured: ${{ secrets.TEAM_ID != '' }}"
